# monitoring/grafana/dashboards/dashboards.yml
# Grafana — Dashboard otomatik yükleme

apiVersion: 1

providers:
  - name: harun_ai
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
