# .github/workflows/ci.yml
# Harun AI Bot — CI/CD Pipeline
# Her push ve PR'da otomatik test çalıştırır.

name: Harun Bot CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Pytest Test Suite
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

      - name: Hafif bağımlılıkları yükle
        run: |
          pip install python-dotenv pyyaml

      - name: Güvenlik taraması (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --ignore-vuln GHSA-jfh8-c2jp-22ac
        continue-on-error: false

      - name: Unit testleri çalıştır
        env:
          TELEGRAM_TOKEN: "test_token"
          GROQ_API_KEY: "test_key"
          PYTHONPATH: .
        run: |
          pytest tests/test_config.py tests/test_resilience.py tests/test_schemas.py tests/test_token_budget.py tests/test_safe_path.py tests/test_rol_yetki.py tests/test_utils.py tests/test_metrics.py -v --tb=short

      - name: Test özeti
        if: always()
        run: |
          pytest tests/test_config.py tests/test_resilience.py tests/test_schemas.py tests/test_token_budget.py tests/test_safe_path.py tests/test_rol_yetki.py tests/test_utils.py tests/test_metrics.py -q --tb=no
