# ============================================================
# Harun AI Bot — docker-compose.yml
# Kullanım: docker compose up --build -d
# ============================================================

services:

  harunbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harun_ai_bot
    restart: unless-stopped

    # .env dosyasını otomatik yükle (TOKEN, API key'ler buradan gelir)
    env_file:
      - .env

    # Port: dashboard.py Flask için
    ports:
      - "5000:5000"

    # Kalıcı dizinler — container silinse bile veriler kaybolmaz
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./exports:/app/exports
      - ./dataset:/app/dataset

    # Sağlık kontrolü
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
